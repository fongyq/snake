<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="icon" type="image/x-icon" href="magnum.ico" />
  <title>贪吃蛇·红白机</title>
  <style>
    @font-face {
      font-family: "Pixel";
      src: local("Courier New"), local("Consolas"), monospace;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
    }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #e8e8e8;
      font-family: "Pixel", "Courier New", monospace;
      color: #f5f0e6;
      padding: 0;
      margin: 0;
      overflow: hidden;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .device {
      display: grid;
      grid-template-rows: minmax(0, 8fr) minmax(0, 2fr);
      grid-template-columns: 1fr;
      box-sizing: border-box;
      width: 90vw;
      height: 98vh;
      max-width: 90vw;
      max-height: 98vh;
      background: linear-gradient(180deg, #c41e1e 0%, #9a1515 100%);
      border: 4px solid #5c0a0a;
      border-radius: 8px;
      padding: 12px;
      box-shadow:
        inset 0 2px 0 rgba(255, 255, 255, 0.15),
        0 8px 0 #4a0808,
        0 12px 24px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      gap: 0;
    }
    .screen-bezel {
      position: relative;
      min-height: 0;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #3a0a0a;
      padding: 8px;
      border-radius: 4px;
      border: 3px solid #2a0606;
    }
    .canvas-wrap {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      align-self: stretch;
      overflow: hidden;
    }
    .canvas-aspect {
      position: relative;
      box-sizing: border-box;
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .canvas-surface {
      position: absolute;
      inset: 0;
      box-sizing: border-box;
      line-height: 0;
    }
    .game-over-overlay {
      position: absolute;
      inset: 0;
      margin: 0;
      display: none;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 2;
    }
    .game-over-overlay.visible {
      display: flex;
    }
    .game-over-text {
      font-family: "Courier New", Courier, monospace;
      font-weight: bold;
      font-size: clamp(18px, 5vw, 28px);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #a01818;
      text-shadow:
        3px 0 0 #f5f0e6,
        -3px 0 0 #f5f0e6,
        0 3px 0 #f5f0e6,
        0 -3px 0 #f5f0e6,
        3px 3px 0 #3a0606;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      animation: gameOverBlink 0.5s linear infinite;
    }
    @keyframes gameOverBlink {
      0%,
      49.5% {
        opacity: 1;
      }
      50%,
      100% {
        opacity: 0.15;
      }
    }
    #game {
      display: block;
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background: #f5f0e6;
      border: 2px solid #1a0505;
    }
    .controls {
      min-height: 0;
      height: 100%;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 0;
      padding-top: 2px;
      align-items: stretch;
      overflow: hidden;
    }
    .controls-zone {
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      height: 100%;
    }
    .controls-zone-inner {
      height: 95%;
      max-height: 95%;
      min-height: 0;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: center;
      gap: 4px;
    }
    .controls-zone-inner--left {
      gap: 0;
      justify-content: flex-start;
    }
    .controls-zone-inner--left .btn-toggle {
      flex: 1 1 0;
      min-height: 0;
      padding: 6px 8px;
      font-size: 22px;
      gap: 8px;
    }
    .controls-zone-inner--left .btn-toggle svg {
      width: 28px;
      height: 28px;
    }
    .controls-zone-inner--left .speed-row {
      flex: 1.5 1 0;
      min-height: 0;
      justify-content: center;
    }
    .controls-zone-inner--left .speed-btns button {
      padding: 12px 3px;
      font-size: calc(9px * 1.5);
      border-radius: 6px;
      border-width: 3px;
    }
    .controls-zone-inner--stats {
      justify-content: stretch;
      align-items: stretch;
    }
    .controls-zone-inner--dpad {
      justify-content: center;
      align-items: center;
    }
    .dpad-wrap {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }
    .dpad-circle,
    .rudder-circle {
      width: auto;
      height: 100%;
      max-height: 100%;
      max-width: 100%;
      aspect-ratio: 1;
    }
    .dpad-wrap.mode-rudder .dpad-circle {
      display: none;
    }
    .dpad-wrap.mode-dpad .rudder-circle {
      display: none;
    }
    .dpad-circle {
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #e8e0d8 0%, #c9bdb0 45%, #8a7a6a 100%);
      border: 3px solid #4a3a30;
      box-shadow:
        inset 0 2px 4px rgba(255, 255, 255, 0.35),
        0 3px 0 #2a2018;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: 1fr 1fr 1fr;
      grid-template-areas:
        ". up ."
        "left center right"
        ". down .";
      padding: 6px;
      gap: 2px;
    }
    .dpad-circle button {
      border: none;
      background: #a01818;
      color: #f5f0e6;
      cursor: pointer;
      font-size: 13px;
      line-height: 1;
      box-shadow: inset 0 -3px 0 #5c0c0c, 0 2px 0 #3a0606;
      border-radius: 4px;
      touch-action: manipulation;
      transition: background 0.12s ease, box-shadow 0.12s ease, transform 0.08s ease;
    }
    .dpad-circle .up:active,
    .dpad-circle .up.is-pressed {
      background: #5c0c0c;
      transform: translateY(1px);
      box-shadow:
        inset 0 3px 8px rgba(255, 248, 230, 0.45),
        inset 0 -8px 14px rgba(20, 0, 0, 0.55),
        0 -6px 18px rgba(255, 210, 100, 0.75),
        0 -2px 8px rgba(255, 230, 160, 0.55);
    }
    .dpad-circle .down:active,
    .dpad-circle .down.is-pressed {
      background: #5c0c0c;
      transform: translateY(1px);
      box-shadow:
        inset 0 -3px 8px rgba(255, 248, 230, 0.45),
        inset 0 8px 14px rgba(20, 0, 0, 0.55),
        0 6px 18px rgba(255, 210, 100, 0.75),
        0 2px 8px rgba(255, 230, 160, 0.55);
    }
    .dpad-circle .left:active,
    .dpad-circle .left.is-pressed {
      background: #5c0c0c;
      transform: translateY(1px);
      box-shadow:
        inset 3px 0 8px rgba(255, 248, 230, 0.45),
        inset -8px 0 14px rgba(20, 0, 0, 0.55),
        -6px 0 18px rgba(255, 210, 100, 0.75),
        -2px 0 8px rgba(255, 230, 160, 0.55);
    }
    .dpad-circle .right:active,
    .dpad-circle .right.is-pressed {
      background: #5c0c0c;
      transform: translateY(1px);
      box-shadow:
        inset -3px 0 8px rgba(255, 248, 230, 0.45),
        inset 8px 0 14px rgba(20, 0, 0, 0.55),
        6px 0 18px rgba(255, 210, 100, 0.75),
        2px 0 8px rgba(255, 230, 160, 0.55);
    }
    .dpad-circle .up { grid-area: up; }
    .dpad-circle .down { grid-area: down; }
    .dpad-circle .left { grid-area: left; }
    .dpad-circle .right { grid-area: right; }
    .dpad-circle .center {
      grid-area: center;
      background: #7a1212;
      pointer-events: none;
      border-radius: 50%;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.3);
      transform: scale(0.9);
      transform-origin: center center;
    }
    .rudder-circle {
      position: relative;
      border-radius: 50%;
      border: 3px solid #4a3a30;
      background: radial-gradient(circle at 35% 30%, #ded5c6 0%, #b8aa96 48%, #786956 100%);
      box-shadow: inset 0 3px 8px rgba(255, 255, 255, 0.35), 0 3px 0 #2a2018;
      touch-action: none;
      overflow: hidden;
    }
    .rudder-ring {
      position: absolute;
      inset: 10%;
      border-radius: 50%;
      border: 2px solid rgba(58, 6, 6, 0.45);
      box-shadow: inset 0 2px 4px rgba(255, 255, 255, 0.3);
    }
    .rudder-knob {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 28%;
      aspect-ratio: 1;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle at 35% 30%, #b71f1f 0%, #7d1313 65%, #561010 100%);
      border: 2px solid #3a0606;
      box-shadow: 0 2px 0 rgba(42, 6, 6, 0.9), inset 0 2px 3px rgba(255, 240, 220, 0.28);
      transition: transform 0.06s linear;
      pointer-events: none;
    }
    .rudder-circle.active .rudder-knob {
      background: radial-gradient(circle at 35% 30%, #8f1515 0%, #621010 65%, #390b0b 100%);
      box-shadow: 0 1px 0 rgba(42, 6, 6, 0.85), inset 0 2px 3px rgba(255, 240, 220, 0.18);
    }
    .input-mode-toggle {
      position: absolute;
      right: 2px;
      bottom: 2px;
      width: clamp(24px, 14%, 34px);
      height: clamp(24px, 14%, 34px);
      border: 2px solid #3a0606;
      border-radius: 50%;
      background: linear-gradient(180deg, #f5f0e6 0%, #d8cfc4 100%);
      color: #5c0a0a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 0 #2a0606;
      cursor: pointer;
      z-index: 6;
      touch-action: manipulation;
    }
    .input-mode-toggle:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 #2a0606;
    }
    .input-mode-toggle svg {
      width: 64%;
      height: 64%;
      display: block;
    }
    .dpad-wrap.mode-dpad .icon-mode-dpad {
      display: block;
    }
    .dpad-wrap.mode-dpad .icon-mode-rudder {
      display: none;
    }
    .dpad-wrap.mode-rudder .icon-mode-dpad {
      display: none;
    }
    .dpad-wrap.mode-rudder .icon-mode-rudder {
      display: block;
    }
    .btn-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      width: 100%;
      box-sizing: border-box;
      padding: 4px 8px;
      background: linear-gradient(180deg, #f5f0e6 0%, #d8cfc4 100%);
      color: #5c0a0a;
      border: 2px solid #3a0a0a;
      border-radius: 3px;
      font-weight: bold;
      font-size: 11px;
      cursor: pointer;
      box-shadow: 0 2px 0 #2a0606;
      touch-action: manipulation;
    }
    .btn-toggle:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #2a0606;
    }
    .btn-toggle svg {
      flex-shrink: 0;
    }
    .speed-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      width: 100%;
      min-width: 0;
    }
    .speed-label {
      font-size: 9px;
      color: #f5d0d0;
      letter-spacing: 0.05em;
    }
    .speed-btns {
      display: flex;
      gap: 4px;
    }
    .speed-btns button {
      flex: 1;
      padding: 3px 2px;
      font-size: 9px;
      font-family: inherit;
      background: #5c0a0a;
      color: #f5f0e6;
      border: 2px solid #f5f0e6;
      border-radius: 4px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .speed-btns button.active {
      background: #f5f0e6;
      color: #5c0a0a;
    }
    .stats {
      width: 100%;
      height: 100%;
      flex: 1 1 auto;
      min-height: 0;
      box-sizing: border-box;
      font-size: 20px;
      line-height: 1.35;
      color: #ffe8e8;
      padding: 5px 6px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      text-align: left;
      display: flex;
      flex-direction: column;
      justify-content: stretch;
      align-items: stretch;
    }
    .stats span {
      flex: 1 1 0;
      display: flex;
      align-items: center;
      min-height: 0;
    }
    @media (max-width: 520px) {
      html {
        overflow-x: hidden;
      }
      .device {
        width: 100%;
        max-width: 100%;
        padding: 8px;
        height: 100vh;
        max-height: 100vh;
        height: 100dvh;
        max-height: 100dvh;
      }
      .controls {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: none;
        gap: 4px;
        padding-top: 0;
        min-height: 0;
      }
      .controls-zone-inner {
        height: 95%;
        max-height: 95%;
      }
      .controls-zone-inner--left .btn-toggle {
        font-size: clamp(13px, 3.8vw, 22px);
        gap: clamp(4px, 1.2vw, 8px);
        padding: clamp(4px, 1.2vw, 6px) clamp(4px, 2vw, 8px);
      }
      .controls-zone-inner--left .btn-toggle svg {
        width: clamp(16px, 5.5vw, 28px);
        height: clamp(16px, 5.5vw, 28px);
      }
      .controls-zone-inner--left .speed-btns button {
        padding: clamp(5px, 2vw, 12px) 2px;
        font-size: clamp(10px, 2.8vw, 14px);
        border-radius: clamp(4px, 1.5vw, 6px);
        border-width: clamp(2px, 0.6vw, 3px);
      }
      .stats {
        font-size: clamp(11px, 3.2vw, 20px);
        padding: 4px;
        line-height: 1.25;
      }
      .dpad-circle {
        padding: clamp(3px, 1vw, 6px);
        gap: 1px;
      }
      .dpad-circle button {
        font-size: clamp(10px, 3vw, 13px);
      }
    }
  </style>
</head>
<body>
  <div class="device">
    <div class="screen-bezel">
      <div class="canvas-wrap">
        <div class="canvas-aspect">
          <div class="canvas-surface">
            <canvas id="game"></canvas>
            <div id="game-over-overlay" class="game-over-overlay" aria-hidden="true">
              <span class="game-over-text">GAME OVER</span>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="controls">
      <div class="controls-zone">
        <div class="controls-zone-inner controls-zone-inner--left">
          <button type="button" class="btn-toggle" id="btn-play-pause" title="开始/暂停">
            <svg id="icon-play" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M8 5v14l11-7z" />
            </svg>
            <svg id="icon-pause" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none" aria-hidden="true">
              <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
            </svg>
            <span id="play-pause-text">开始</span>
          </button>
          <div class="speed-row">
            <div class="speed-btns" role="group" aria-label="速度三档">
              <button type="button" data-speed="0">慢</button>
              <button type="button" data-speed="1" class="active">中</button>
              <button type="button" data-speed="2">快</button>
            </div>
          </div>
        </div>
      </div>
      <div class="controls-zone">
        <div class="controls-zone-inner controls-zone-inner--stats">
          <div class="stats">
            <span>时长：<strong id="stat-time">0</strong> 秒</span>
            <span>得分：<strong id="stat-score">0</strong></span>
          </div>
        </div>
      </div>
      <div class="controls-zone">
        <div class="controls-zone-inner controls-zone-inner--dpad">
          <div class="dpad-wrap mode-dpad" id="dpad-wrap">
            <div class="dpad-circle" aria-label="方向键">
              <button type="button" class="up" id="btn-up" aria-label="上">▲</button>
              <button type="button" class="left" id="btn-left" aria-label="左">◀</button>
              <div class="center" aria-hidden="true"></div>
              <button type="button" class="right" id="btn-right" aria-label="右">▶</button>
              <button type="button" class="down" id="btn-down" aria-label="下">▼</button>
            </div>
            <div class="rudder-circle" id="rudder-circle" aria-label="方向舵" role="application">
              <div class="rudder-ring" aria-hidden="true"></div>
              <div class="rudder-knob" id="rudder-knob" aria-hidden="true"></div>
            </div>
            <button type="button" class="input-mode-toggle" id="btn-input-mode" aria-label="切换到方向舵模式" title="切换方向控制">
              <svg class="icon-mode-dpad" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M10 3h4v4h4v4h-4v2h4v4h-4v4h-4v-4H6v-4h4v-2H6V7h4z" />
              </svg>
              <svg class="icon-mode-rudder" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 2a3 3 0 0 1 3 3v3.2a6.4 6.4 0 0 1 4.8 4.8H23v2h-3.2a6.4 6.4 0 0 1-4.8 4.8V23h-2v-3.2a6.4 6.4 0 0 1-4.8-4.8H1v-2h7.2a6.4 6.4 0 0 1 4.8-4.8V5a1 1 0 0 0-2 0H9a3 3 0 0 1 3-3zm0 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    (function () {
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const gameOverOverlay = document.getElementById("game-over-overlay");
      const canvasAspect = canvas.closest(".canvas-aspect");
      const dpadWrap = document.getElementById("dpad-wrap");
      const rudderCircle = document.getElementById("rudder-circle");
      const rudderKnob = document.getElementById("rudder-knob");
      const btnInputMode = document.getElementById("btn-input-mode");
      /** 每格像素边长（仅影响位图清晰度；显示区域与网格逻辑不变，可调 24/32/48） */
      const CELL_PX = 32;

      let audioCtx = null;
      function getAudioContext() {
        if (!audioCtx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) audioCtx = new AC();
        }
        return audioCtx;
      }
      function playBubbleSound() {
        const ac = getAudioContext();
        if (!ac) return;
        if (ac.state === "suspended") ac.resume();
        const t0 = ac.currentTime;
        const dur = 0.14;
        const peak = 0.6;

        const osc1 = ac.createOscillator();
        osc1.type = "sine";
        osc1.frequency.setValueAtTime(380, t0);
        osc1.frequency.exponentialRampToValueAtTime(920, t0 + 0.04);
        osc1.frequency.exponentialRampToValueAtTime(420, t0 + dur);

        const osc2 = ac.createOscillator();
        osc2.type = "sine";
        osc2.frequency.setValueAtTime(760, t0);
        osc2.frequency.exponentialRampToValueAtTime(1320, t0 + 0.035);

        const filter = ac.createBiquadFilter();
        filter.type = "bandpass";
        filter.frequency.value = 1100;
        filter.Q.value = 2.5;

        const gain = ac.createGain();
        gain.gain.setValueAtTime(0.001, t0);
        gain.gain.linearRampToValueAtTime(peak, t0 + 0.018);
        gain.gain.exponentialRampToValueAtTime(0.01, t0 + dur);

        osc1.connect(filter);
        osc2.connect(filter);
        filter.connect(gain);
        gain.connect(ac.destination);
        osc1.start(t0);
        osc1.stop(t0 + dur + 0.02);
        osc2.start(t0);
        osc2.stop(t0 + dur + 0.02);
      }

      function setGameOverOverlay(visible) {
        if (visible) {
          gameOverOverlay.classList.add("visible");
          gameOverOverlay.setAttribute("aria-hidden", "false");
        } else {
          gameOverOverlay.classList.remove("visible");
          gameOverOverlay.setAttribute("aria-hidden", "true");
        }
      }

      let COLS = 48;
      let ROWS = 36;
      let CELL_W = 1;
      let CELL_H = 1;

      const SPEED_MS = [220, 140, 85];

      let speedIndex = 1;
      let tickMs = SPEED_MS[speedIndex];
      let timerId = null;
      let spawnTimerId = null;

      let dir = { x: 1, y: 0 };
      let nextDir = { x: 1, y: 0 };

      let snake = [];
      let foods = [];

      let score = 0;
      let playing = false;
      let paused = true;
      let gameOver = false;

      let timeStarted = 0;
      let pausedAccum = 0;
      const FOOD_LIFETIME_MS = 10000;
      const MAX_FOODS = 3;
      const SPAWN_INTERVAL_MS = 700;

      let layoutTimer = null;
      let lastLayoutKey = "";

      function applyLayoutFromContainer() {
        if (!canvasAspect) return;
        const w = canvasAspect.clientWidth;
        const h = canvasAspect.clientHeight;
        if (w < 2 || h < 2) return;
        const ar = w / h;
        const newRows = 36;
        const newCols = Math.max(24, Math.min(120, Math.round(newRows * ar)));
        const key = `${newCols}x${newRows}`;
        if (key === lastLayoutKey && canvas.width === newCols * CELL_PX && canvas.height === newRows * CELL_PX) {
          return;
        }
        lastLayoutKey = key;
        stopGameLoop();
        COLS = newCols;
        ROWS = newRows;
        canvas.width = COLS * CELL_PX;
        canvas.height = ROWS * CELL_PX;
        CELL_W = canvas.width / COLS;
        CELL_H = canvas.height / ROWS;
        gameOver = false;
        setGameOverOverlay(false);
        playing = false;
        paused = true;
        score = 0;
        pausedAccum = 0;
        foods = [];
        resetSnake();
        updatePlayPauseUI();
        updateStats();
        draw();
      }

      function scheduleLayout() {
        if (layoutTimer) clearTimeout(layoutTimer);
        layoutTimer = setTimeout(() => {
          layoutTimer = null;
          applyLayoutFromContainer();
        }, 32);
      }

      function resetSnake() {
        const cx = Math.floor(COLS / 2);
        const cy = Math.floor(ROWS / 2);
        snake = [
          { x: cx - 1, y: cy },
          { x: cx, y: cy },
          { x: cx + 1, y: cy },
        ];
        dir = { x: 1, y: 0 };
        nextDir = { x: 1, y: 0 };
      }

      function cellOccupiedBySnake(x, y) {
        return snake.some((s) => s.x === x && s.y === y);
      }

      function cellOccupiedByFood(x, y) {
        return foods.some((f) => f.x === x && f.y === y);
      }

      function randomEmptyCell() {
        let x, y;
        let guard = 0;
        do {
          x = Math.floor(Math.random() * COLS);
          y = Math.floor(Math.random() * ROWS);
          guard++;
        } while ((cellOccupiedBySnake(x, y) || cellOccupiedByFood(x, y)) && guard < 5000);
        if (guard >= 5000) return null;
        return { x, y };
      }

      function trySpawnFood() {
        if (foods.length >= MAX_FOODS) return;
        const pos = randomEmptyCell();
        if (!pos) return;
        const isSmall = Math.random() < 0.75;
        foods.push({
          x: pos.x,
          y: pos.y,
          large: !isSmall,
          t0: performance.now(),
        });
      }

      function removeExpiredFoods(now) {
        foods = foods.filter((f) => now - f.t0 < FOOD_LIFETIME_MS);
      }

      function wrap(v, max) {
        const m = ((v % max) + max) % max;
        return m;
      }

      function tick() {
        if (!playing || paused || gameOver) return;

        const now = performance.now();
        removeExpiredFoods(now);

        nextDir.x = Math.abs(nextDir.x) + Math.abs(nextDir.y) === 0 ? dir.x : nextDir.x;
        nextDir.y = Math.abs(nextDir.x) + Math.abs(nextDir.y) === 0 ? dir.y : nextDir.y;
        if (dir.x + nextDir.x === 0 && dir.y + nextDir.y === 0) {
          nextDir = { ...dir };
        }
        dir = { ...nextDir };

        const head = snake[snake.length - 1];
        let nx = wrap(head.x + dir.x, COLS);
        let ny = wrap(head.y + dir.y, ROWS);

        const hitSelf = snake.slice(1, -1).some((s) => s.x === nx && s.y === ny);
        if (hitSelf) {
          gameOver = true;
          playing = false;
          paused = true;
          setGameOverOverlay(true);
          updatePlayPauseUI();
          stopGameLoop();
          draw();
          return;
        }

        let ate = false;
        let ateIdx = -1;
        for (let i = 0; i < foods.length; i++) {
          if (foods[i].x === nx && foods[i].y === ny) {
            ate = true;
            ateIdx = i;
            break;
          }
        }

        snake.push({ x: nx, y: ny });
        if (!ate) {
          snake.shift();
        } else {
          const f = foods[ateIdx];
          score += f.large ? 5 : 1;
          foods.splice(ateIdx, 1);
          playBubbleSound();
        }

        updateStats();
        draw();
      }

      function draw() {
        ctx.fillStyle = "#f5f0e6";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        const t = performance.now() * 0.01;
        const blink = 0.82 + 0.18 * (0.5 + 0.5 * Math.sin(t));
        const cellMin = Math.min(CELL_W, CELL_H);
        const inset = Math.max(0.5, cellMin * 0.08);
        const drawScale = 1.5;

        for (let i = 0; i < foods.length; i++) {
          const f = foods[i];
          const cx = f.x * CELL_W + CELL_W / 2;
          const cy = f.y * CELL_H + CELL_H / 2;
          const r = (f.large ? cellMin * 0.4 : cellMin * 0.2) * drawScale;
          ctx.beginPath();
          ctx.arc(Math.floor(cx) + 0.5, Math.floor(cy) + 0.5, r, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(140, 12, 12, ${blink})`;
          ctx.fill();
          ctx.strokeStyle = "#2a0606";
          ctx.lineWidth = Math.max(1, 2 * drawScale);
          ctx.stroke();
        }

        for (let i = 0; i < snake.length; i++) {
          const seg = snake[i];
          const px = seg.x * CELL_W;
          const py = seg.y * CELL_H;
          const isHead = i === snake.length - 1;
          const innerW = CELL_W - 2 * inset;
          const innerH = CELL_H - 2 * inset;
          const drawW = innerW * drawScale;
          const drawH = innerH * drawScale;
          const ox = px + (CELL_W - drawW) / 2;
          const oy = py + (CELL_H - drawH) / 2;
          ctx.fillStyle = isHead ? "#7a1212" : "#a01818";
          ctx.fillRect(
            Math.floor(ox),
            Math.floor(oy),
            Math.max(1, drawW),
            Math.max(1, drawH)
          );
          ctx.strokeStyle = "#3a0606";
          ctx.lineWidth = Math.max(1, drawScale);
          ctx.strokeRect(
            Math.floor(ox) + 0.5,
            Math.floor(oy) + 0.5,
            Math.max(0, drawW - 1),
            Math.max(0, drawH - 1)
          );
        }
      }

      function updateStats() {
        const elapsedSec = playing && !paused
          ? Math.floor((pausedAccum + (performance.now() - timeStarted)) / 1000)
          : Math.floor(pausedAccum / 1000);
        document.getElementById("stat-time").textContent = String(elapsedSec);
        document.getElementById("stat-score").textContent = String(score);
      }

      function updatePlayPauseUI() {
        const playIcon = document.getElementById("icon-play");
        const pauseIcon = document.getElementById("icon-pause");
        const text = document.getElementById("play-pause-text");
        if (gameOver) {
          playIcon.style.display = "inline";
          pauseIcon.style.display = "none";
          text.textContent = "开始";
        } else if (playing && !paused) {
          playIcon.style.display = "none";
          pauseIcon.style.display = "inline";
          text.textContent = "暂停";
        } else {
          playIcon.style.display = "inline";
          pauseIcon.style.display = "none";
          text.textContent = playing ? "继续" : "开始";
        }
      }

      function stopGameLoop() {
        if (timerId) {
          clearInterval(timerId);
          timerId = null;
        }
        if (spawnTimerId) {
          clearInterval(spawnTimerId);
          spawnTimerId = null;
        }
      }

      function startGameLoop() {
        stopGameLoop();
        timerId = setInterval(tick, tickMs);
        spawnTimerId = setInterval(() => {
          if (playing && !paused && !gameOver) trySpawnFood();
        }, SPAWN_INTERVAL_MS);
      }

      function resumeTimer() {
        timeStarted = performance.now();
      }

      function pauseTimer() {
        pausedAccum += performance.now() - timeStarted;
      }

      function startNewGame() {
        gameOver = false;
        setGameOverOverlay(false);
        score = 0;
        pausedAccum = 0;
        foods = [];
        resetSnake();
        playing = true;
        paused = false;
        resumeTimer();
        updatePlayPauseUI();
        updateStats();
        trySpawnFood();
        trySpawnFood();
        draw();
        startGameLoop();
      }

      function togglePlayPause() {
        if (gameOver) {
          startNewGame();
          return;
        }
        if (!playing) {
          playing = true;
          paused = false;
          resumeTimer();
          updatePlayPauseUI();
          trySpawnFood();
          trySpawnFood();
          startGameLoop();
          draw();
          return;
        }
        paused = !paused;
        if (paused) {
          pauseTimer();
          stopGameLoop();
        } else {
          resumeTimer();
          startGameLoop();
        }
        updatePlayPauseUI();
        updateStats();
        draw();
      }

      function setDirection(dx, dy) {
        if (!playing || paused || gameOver) return;
        if (dir.x + dx === 0 && dir.y + dy === 0) return;
        nextDir = { x: dx, y: dy };
      }

      let inputMode = "dpad";
      let rudderPointerId = null;
      const RUDDER_DEADZONE_RATIO = 0.22;
      const RUDDER_KNOB_LIMIT_RATIO = 0.62;

      function updateInputModeUI() {
        if (!dpadWrap || !btnInputMode) return;
        dpadWrap.classList.toggle("mode-dpad", inputMode === "dpad");
        dpadWrap.classList.toggle("mode-rudder", inputMode === "rudder");
        const to = inputMode === "dpad" ? "方向舵" : "方向键";
        btnInputMode.setAttribute("aria-label", `切换到${to}模式`);
        btnInputMode.title = `切换到${to}模式`;
      }

      function setRudderKnob(dx, dy, limit) {
        if (!rudderKnob) return;
        const mag = Math.hypot(dx, dy);
        let px = dx;
        let py = dy;
        if (mag > limit && mag > 0) {
          px = (dx / mag) * limit;
          py = (dy / mag) * limit;
        }
        rudderKnob.style.transform = `translate(calc(-50% + ${px}px), calc(-50% + ${py}px))`;
      }

      function handleRudderDirection(dx, dy, radius) {
        const deadzone = radius * RUDDER_DEADZONE_RATIO;
        const mag = Math.hypot(dx, dy);
        const limit = radius * RUDDER_KNOB_LIMIT_RATIO;
        if (mag <= deadzone) {
          setRudderKnob(0, 0, limit);
          return;
        }
        setRudderKnob(dx, dy, limit);
        if (Math.abs(dx) >= Math.abs(dy)) {
          setDirection(dx >= 0 ? 1 : -1, 0);
        } else {
          setDirection(0, dy >= 0 ? 1 : -1);
        }
      }

      function updateRudderByClient(clientX, clientY) {
        if (!rudderCircle) return;
        const rect = rudderCircle.getBoundingClientRect();
        const cx = rect.left + rect.width / 2;
        const cy = rect.top + rect.height / 2;
        const dx = clientX - cx;
        const dy = clientY - cy;
        const radius = Math.min(rect.width, rect.height) * 0.5;
        handleRudderDirection(dx, dy, radius);
      }

      function resetRudderVisual() {
        if (!rudderCircle) return;
        rudderCircle.classList.remove("active");
        if (rudderKnob) {
          rudderKnob.style.transform = "translate(-50%, -50%)";
        }
      }

      const dpadIds = ["btn-up", "btn-down", "btn-left", "btn-right"];
      dpadIds.forEach((id) => {
        const el = document.getElementById(id);
        if (!el) return;
        const pressed = "is-pressed";
        el.addEventListener("touchstart", () => el.classList.add(pressed), { passive: true });
        el.addEventListener("touchend", () => el.classList.remove(pressed));
        el.addEventListener("touchcancel", () => el.classList.remove(pressed));
      });
      document.getElementById("btn-up").addEventListener("click", () => setDirection(0, -1));
      document.getElementById("btn-down").addEventListener("click", () => setDirection(0, 1));
      document.getElementById("btn-left").addEventListener("click", () => setDirection(-1, 0));
      document.getElementById("btn-right").addEventListener("click", () => setDirection(1, 0));

      if (btnInputMode) {
        btnInputMode.addEventListener("click", () => {
          inputMode = inputMode === "dpad" ? "rudder" : "dpad";
          resetRudderVisual();
          updateInputModeUI();
        });
      }

      if (rudderCircle) {
        rudderCircle.addEventListener("pointerdown", (e) => {
          if (inputMode !== "rudder") return;
          rudderPointerId = e.pointerId;
          rudderCircle.classList.add("active");
          rudderCircle.setPointerCapture(e.pointerId);
          updateRudderByClient(e.clientX, e.clientY);
          e.preventDefault();
        });
        rudderCircle.addEventListener("pointermove", (e) => {
          if (inputMode !== "rudder" || rudderPointerId !== e.pointerId) return;
          updateRudderByClient(e.clientX, e.clientY);
          e.preventDefault();
        });
        const endRudder = (e) => {
          if (rudderPointerId !== e.pointerId) return;
          rudderPointerId = null;
          resetRudderVisual();
        };
        rudderCircle.addEventListener("pointerup", endRudder);
        rudderCircle.addEventListener("pointercancel", endRudder);
      }

      updateInputModeUI();

      document.getElementById("btn-play-pause").addEventListener("click", togglePlayPause);

      document.querySelectorAll(".speed-btns button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const idx = Number(btn.getAttribute("data-speed"));
          speedIndex = idx;
          tickMs = SPEED_MS[speedIndex];
          document.querySelectorAll(".speed-btns button").forEach((b) => b.classList.remove("active"));
          btn.classList.add("active");
          if (playing && !paused && !gameOver) {
            stopGameLoop();
            startGameLoop();
          }
        });
      });

      document.addEventListener("keydown", (e) => {
        switch (e.key) {
          case "ArrowUp":
            setDirection(0, -1);
            e.preventDefault();
            break;
          case "ArrowDown":
            setDirection(0, 1);
            e.preventDefault();
            break;
          case "ArrowLeft":
            setDirection(-1, 0);
            e.preventDefault();
            break;
          case "ArrowRight":
            setDirection(1, 0);
            e.preventDefault();
            break;
          case " ":
            togglePlayPause();
            e.preventDefault();
            break;
          default:
            break;
        }
      });

      let lastFrame = performance.now();
      function animate() {
        const now = performance.now();
        if (playing && !paused && !gameOver) {
          removeExpiredFoods(now);
          if (Math.floor(now / 1000) !== Math.floor(lastFrame / 1000)) {
            updateStats();
          }
        }
        lastFrame = now;
        if (playing && !paused && !gameOver) {
          draw();
        }
        requestAnimationFrame(animate);
      }

      applyLayoutFromContainer();
      requestAnimationFrame(() => {
        applyLayoutFromContainer();
      });
      if (typeof ResizeObserver !== "undefined" && canvasAspect) {
        new ResizeObserver(scheduleLayout).observe(canvasAspect);
      } else {
        window.addEventListener("resize", scheduleLayout);
      }

      updatePlayPauseUI();
      updateStats();
      requestAnimationFrame(animate);
    })();
  </script>
</body>
</html>
